<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dell Premium Showcase - S.S. Dev</title>
    <style>
        :root {
            --laptop-body: #3a3a3c;
            --keyboard-bg: #222;
            --dell-blue: #007db8;
            --screen-bg: #000;
        }

        body {
            background-color: #050a10;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 2500px;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* --- Main Laptop Structure --- */
        .laptop-container {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(10deg);
            animation: intro-view 2s ease-out forwards;
        }

        /* --- Upper Part: Lid & Screen --- */
        .lid {
            width: 850px; /* Bada Screen Size */
            height: 520px;
            background: var(--laptop-body);
            border: 12px solid #1a1a1a;
            border-radius: 12px 12px 0 0;
            transform-origin: bottom;
            transform: rotateX(-90deg); /* Band laptop */
            animation: open-dell 2.5s cubic-bezier(0.6, 0, 0.4, 1) 1s forwards;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Dell Logo on Screen Bottom */
        .screen-bottom-bar {
            height: 35px;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .dell-text { color: var(--dell-blue); font-style: italic; }

        .screen-content {
            flex: 1;
            background: var(--screen-bg);
            overflow: hidden;
            position: relative;
        }

        .screen-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            animation: power-on 1s ease-in 3s forwards;
        }

        /* --- Lower Part: Keyboard Base --- */
        .base {
            width: 900px;
            height: 550px;
            background: linear-gradient(135deg, #444, #222);
            margin-left: -25px;
            border-radius: 10px 10px 20px 20px;
            transform: rotateX(75deg);
            transform-origin: top;
            margin-top: -10px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            padding: 40px;
            box-sizing: border-box;
        }

        /* Simple Keyboard Visual */
        .keyboard {
            width: 85%;
            height: 50%;
            margin: 20px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 8px;
            padding: 15px;
        }

        .key {
            background: #111;
            border-bottom: 2px solid #000;
            border-radius: 3px;
        }

        .trackpad {
            width: 200px;
            height: 120px;
            background: rgba(0,0,0,0.2);
            margin: 20px auto 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        /* --- Animations --- */
        @keyframes open-dell {
            0% { transform: rotateX(-90deg); }
            100% { transform: rotateX(-5deg); } /* Thoda peeche jhuka hua real feel */
        }

        @keyframes power-on {
            0% { opacity: 0; filter: brightness(0); }
            100% { opacity: 1; filter: brightness(1); }
        }

        @keyframes intro-view {
            0% { transform: scale(0.7) translateY(200px) rotateX(20deg); opacity: 0; }
            100% { transform: scale(0.9) translateY(0) rotateX(10deg); opacity: 1; }
        }

        /* Logo and Text */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* Mobile adjustments */
        @media (max-width: 900px) {
            .laptop-container { transform: scale(0.5); }
            .base { display: none; } /* Mobile par keyboard hide karein */
            .lid { transform: rotateX(0deg) !important; animation: none; width: 90vw; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1 style="color: white; margin: 0;">S.S. DEV <span style="color: var(--dell-blue);">Digital Lab</span></h1>
        <p style="color: #666;">Opening your secure workspace...</p>
    </div>

    <div class="laptop-container">
        <div class="lid">
            <div class="screen-content">
                <iframe src="/index.html" title="Dell Workspace"></iframe>
            </div>
            <div class="screen-bottom-bar">
                <span>DELL</span>
            </div>
        </div>
        
        <div class="base">
            <div class="keyboard">
                <script>
                    for(let i=0; i<60; i++) {
                        document.write('<div class="key"></div>');
                    }
                </script>
            </div>
            <div class="trackpad"></div>
        </div>
    </div>

</body>
</html>
